version: "3.8"

# ── Benchmark Docker Compose ──────────────────────────────────────────
# Each backend service is limited to 1 vCPU and 2 GB RAM.
# Services are NOT started all at once — use profiles or run individually.
# Usage: docker compose --profile <name> up -d
#   e.g. docker compose --profile rust up -d

x-resource-limits: &resource-limits
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 2gb

x-common-env: &common-env
  DB_HOST: postgres

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: bench
    ports:
      - "5433:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d bench"]
      interval: 2s
      timeout: 5s
      retries: 15
    <<: *resource-limits

  # ── Rust / Actix-web ───────────────────────────────────────────────
  rust-actix:
    build: ./rust_actix
    profiles: ["rust", "all"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    <<: *resource-limits

  # ── Go / Fiber ─────────────────────────────────────────────────────
  go-fiber:
    build: ./go_fiber
    profiles: ["go", "all"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    <<: *resource-limits

  # ── Python / FastAPI ───────────────────────────────────────────────
  python-fastapi:
    build: ./python_fastapi
    profiles: ["python", "all"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    <<: *resource-limits

  # ── Node.js / Fastify ──────────────────────────────────────────────
  node-fastify:
    build: ./node_fastify
    profiles: ["node", "all"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    <<: *resource-limits

  # ── PHP / Swoole ───────────────────────────────────────────────────
  php-swoole:
    build: ./php_swoole
    profiles: ["php", "all"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    <<: *resource-limits

  # ── Elixir / Phoenix ──────────────────────────────────────────────
  elixir-phoenix:
    build: ./elixir_phoenix
    profiles: ["elixir", "all"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
      SECRET_KEY_BASE: "benchmarksecretkeythatisatleast64byteslongforphoenixtobehappy000"
    depends_on:
      postgres:
        condition: service_healthy
    <<: *resource-limits

  # ── Zig / Zap ─────────────────────────────────────────────────────
  zig-zap:
    build: ./zig_zap
    profiles: ["zig", "all"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    <<: *resource-limits

  # ── C / Mongoose ───────────────────────────────────────────────────
  c-mongoose:
    build: ./c_mongoose
    profiles: ["c", "all"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    <<: *resource-limits

  # ── Common Lisp / Hunchentoot ──────────────────────────────────────
  lisp-hunchentoot:
    build: ./lisp_hunchentoot
    profiles: ["lisp", "all"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    <<: *resource-limits

  # ── Java / Quarkus ────────────────────────────────────────────────
  java-quarkus:
    build: ./java_quarkus
    profiles: ["java", "all"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    <<: *resource-limits

  # ── Fortran + C / Mongoose ────────────────────────────────────────
  fortran-server:
    build: ./fortran_server
    profiles: ["fortran", "all"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    <<: *resource-limits

  # ── COBOL + C / Mongoose ──────────────────────────────────────────
  cobol-server:
    build: ./cobol_server
    profiles: ["cobol", "all"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    <<: *resource-limits

  # ── Erlang / Cowboy ───────────────────────────────────────────────
  erlang-cowboy:
    build: ./erlang_cowboy
    profiles: ["erlang", "all"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    <<: *resource-limits

  # ── Ruby / Falcon ─────────────────────────────────────────────────
  ruby-falcon:
    build: ./ruby_falcon
    profiles: ["ruby", "all"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    <<: *resource-limits

  # ── Clojure / Http-kit ────────────────────────────────────────────
  clojure-httpkit:
    build: ./clojure_httpkit
    profiles: ["clojure", "all"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    <<: *resource-limits

  # ── Scala / Pekko HTTP ────────────────────────────────────────────
  scala-pekko:
    build: ./scala_pekko
    profiles: ["scala", "all"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    <<: *resource-limits

  # ── k6 load tester ────────────────────────────────────────────────
  k6:
    image: grafana/k6:0.53.0
    profiles: ["k6"]
    volumes:
      - ./k6:/scripts:ro
      - ./results:/results
    network_mode: host

volumes:
  pgdata:
